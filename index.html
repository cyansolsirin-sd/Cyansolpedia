<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyansolpedia - 配对排序器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body {
      background-color: #121212;
      color: #f3f4f6;
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #121212; }
    ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #00FFFF; }

    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px) scale(0.98); } 
      to { opacity: 1; transform: translateY(0) scale(1); } 
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cyan-accent': '#00FFFF',
            'charcoal': '#121212',
            'charcoal-light': '#1E1E1E',
            'charcoal-lighter': '#2A2A2A',
          }
        }
      }
    }
  </script>
</head>
<body class="selection:bg-cyan-accent/30">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const INITIAL_ELO = 1200;
    const K_FACTOR = 32;

    // --- 内置 SVG 图标 ---
    const HexagonIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>;
    const ArrowRightIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>;
    const EqualIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" x2="19" y1="9" y2="9"></line><line x1="5" x2="19" y1="15" y2="15"></line></svg>;
    const TrophyIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;
    const RefreshCwIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;

    function PairedSorter() {
      const [phase, setPhase] = useState('input');
      const [inputText, setInputText] = useState('');
      const [items, setItems] = useState([]);
      const [currentPair, setCurrentPair] = useState(null);
      const [seenPairs, setSeenPairs] = useState(new Set());
      const [comparisonCount, setComparisonCount] = useState(0);

      const handleStart = () => {
        const lines = inputText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        if (lines.length < 2) {
          alert('请输入至少两个项目进行排序。');
          return;
        }

        const newItems = lines.map((text, index) => ({
          id: `item-${index}-${Date.now()}`,
          text,
          elo: INITIAL_ELO,
          matches: 0,
        }));

        setItems(newItems);
        setPhase('sorting');
        setSeenPairs(new Set());
        setComparisonCount(0);
        pickNextPair(newItems, new Set());
      };

      const pickNextPair = (currentItems, currentSeen) => {
        if (currentItems.length < 2) return;

        const sortedByMatches = [...currentItems].sort((a, b) => a.matches - b.matches);
        const itemA = sortedByMatches[0];

        let bestOpponent = sortedByMatches[1];
        let smallestEloDiff = Infinity;

        for (let i = 1; i < sortedByMatches.length; i++) {
          const candidate = sortedByMatches[i];
          const pairId1 = `${itemA.id}-${candidate.id}`;
          const pairId2 = `${candidate.id}-${itemA.id}`;
          
          if (!currentSeen.has(pairId1) && !currentSeen.has(pairId2)) {
            const eloDiff = Math.abs(itemA.elo - candidate.elo);
            if (eloDiff < smallestEloDiff) {
              smallestEloDiff = eloDiff;
              bestOpponent = candidate;
            }
          }
        }

        if (smallestEloDiff === Infinity) {
           for (let i = 1; i < sortedByMatches.length; i++) {
             const candidate = sortedByMatches[i];
             const eloDiff = Math.abs(itemA.elo - candidate.elo);
             if (eloDiff < smallestEloDiff) {
               smallestEloDiff = eloDiff;
               bestOpponent = candidate;
             }
           }
        }

        if (Math.random() > 0.5) {
          setCurrentPair([itemA, bestOpponent]);
        } else {
          setCurrentPair([bestOpponent, itemA]);
        }
      };

      const handleChoice = (winnerIndex) => {
        if (!currentPair) return;

        const [itemA, itemB] = currentPair;
        
        const expectedA = 1 / (1 + Math.pow(10, (itemB.elo - itemA.elo) / 400));
        const expectedB = 1 / (1 + Math.pow(10, (itemA.elo - itemB.elo) / 400));

        let scoreA = 0.5;
        let scoreB = 0.5;
        if (winnerIndex === 0) {
          scoreA = 1;
          scoreB = 0;
        } else if (winnerIndex === 1) {
          scoreA = 0;
          scoreB = 1;
        }

        const newEloA = itemA.elo + K_FACTOR * (scoreA - expectedA);
        const newEloB = itemB.elo + K_FACTOR * (scoreB - expectedB);

        const updatedItems = items.map(item => {
          if (item.id === itemA.id) return { ...item, elo: newEloA, matches: item.matches + 1 };
          if (item.id === itemB.id) return { ...item, elo: newEloB, matches: item.matches + 1 };
          return item;
        });

        const newSeen = new Set(seenPairs);
        newSeen.add(`${itemA.id}-${itemB.id}`);

        setItems(updatedItems);
        setSeenPairs(newSeen);
        setComparisonCount(prev => prev + 1);

        pickNextPair(updatedItems, newSeen);
      };

      const handleFinish = () => {
        setPhase('results');
      };

      const handleReset = () => {
        setPhase('input');
        setInputText('');
        setItems([]);
        setCurrentPair(null);
      };

      const sortedItems = useMemo(() => {
        return [...items].sort((a, b) => b.elo - a.elo);
      }, [items]);

      const renderInputPhase = () => (
        <div className="flex flex-col gap-6 fade-in">
          <div className="space-y-2">
            <h2 className="text-2xl font-semibold text-white">输入你的列表</h2>
            <p className="text-gray-400 text-sm">在下方粘贴你的选项，每行一个。我们将帮你进行排序。</p>
          </div>
          <textarea
            className="w-full h-64 bg-charcoal-light border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-cyan-accent/50 focus:ring-1 focus:ring-cyan-accent/50 transition-all resize-none"
            placeholder="Isabella of France&#10;Margaret of Anjou&#10;Anne Boleyn&#10;Henrietta Maria of France"
            value={inputText}
            onChange={(e) => setInputText(e.target.value)}
          />
          <button
            onClick={handleStart}
            disabled={inputText.trim().length === 0}
            className="self-end flex items-center gap-2 bg-white text-charcoal px-6 py-3 rounded-full font-medium hover:bg-cyan-accent transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            开始排序 <ArrowRightIcon />
          </button>
        </div>
      );

      const renderSortingPhase = () => {
        if (!currentPair) return null;
        const [itemA, itemB] = currentPair;
        const canFinish = items.every(i => i.matches >= 1) && comparisonCount >= items.length;

        return (
          <div className="flex flex-col gap-8 items-center fade-in" key={comparisonCount}>
            <div className="text-center space-y-1">
              <h2 className="text-xl font-medium text-gray-300">你更倾向于哪一个？</h2>
              <p className="text-xs text-gray-500">第 {comparisonCount + 1} 次比较</p>
            </div>

            <div className="flex flex-col md:flex-row gap-4 w-full justify-center items-stretch">
              <button
                onClick={() => handleChoice(0)}
                className="flex-1 min-h-[160px] p-6 bg-charcoal-light border border-white/5 rounded-2xl hover:border-cyan-accent/50 hover:bg-charcoal-lighter hover:shadow-[0_0_30px_rgba(0,255,255,0.1)] transition-all group flex items-center justify-center text-center cursor-pointer"
              >
                <span className="text-2xl font-medium text-white group-hover:text-cyan-accent transition-colors">
                  {itemA.text}
                </span>
              </button>

              <div className="flex items-center justify-center md:px-4 py-2">
                <span className="text-gray-600 font-mono text-sm">VS</span>
              </div>

              <button
                onClick={() => handleChoice(1)}
                className="flex-1 min-h-[160px] p-6 bg-charcoal-light border border-white/5 rounded-2xl hover:border-cyan-accent/50 hover:bg-charcoal-lighter hover:shadow-[0_0_30px_rgba(0,255,255,0.1)] transition-all group flex items-center justify-center text-center cursor-pointer"
              >
                <span className="text-2xl font-medium text-white group-hover:text-cyan-accent transition-colors">
                  {itemB.text}
                </span>
              </button>
            </div>

            <div className="flex flex-col items-center gap-6 mt-4 w-full">
              <button
                onClick={() => handleChoice(null)}
                className="flex items-center gap-2 text-gray-400 hover:text-white px-6 py-2 rounded-full border border-white/10 hover:border-white/30 transition-all cursor-pointer"
              >
                <EqualIcon /> 它们一样好
              </button>

              {canFinish && (
                <button
                  onClick={handleFinish}
                  className="text-cyan-accent hover:text-white text-sm underline underline-offset-4 transition-colors cursor-pointer fade-in"
                >
                  完成并查看排名
                </button>
              )}
            </div>
          </div>
        );
      };

      const renderResultsPhase = () => (
        <div className="flex flex-col gap-8 fade-in">
          <div className="flex items-center justify-between border-b border-white/10 pb-6">
            <div>
              <h2 className="text-2xl font-semibold text-white flex items-center gap-3">
                <span className="text-cyan-accent"><TrophyIcon /></span> 最终排名
              </h2>
              <p className="text-gray-400 text-sm mt-1">基于 {comparisonCount} 次比较得出。</p>
            </div>
            <button
              onClick={handleReset}
              className="flex items-center gap-2 text-gray-400 hover:text-cyan-accent transition-colors cursor-pointer"
              title="重新开始"
            >
              <RefreshCwIcon />
            </button>
          </div>

          <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2">
            {sortedItems.map((item, index) => (
              <div
                key={item.id}
                className="flex items-center gap-4 p-4 bg-charcoal-light rounded-xl border border-white/5 hover:border-white/10 transition-colors fade-in"
                style={{ animationDelay: `${index * 0.05}s`, animationFillMode: 'both' }}
              >
                <div className={`
                  w-8 h-8 rounded-full flex items-center justify-center font-mono text-sm font-bold
                  ${index === 0 ? 'bg-cyan-accent text-charcoal' : 
                    index === 1 ? 'bg-gray-300 text-charcoal' : 
                    index === 2 ? 'bg-amber-700 text-white' : 'bg-charcoal-lighter text-gray-400'}
                `}>
                  {index + 1}
                </div>
                <div className="flex-1 text-lg text-white font-medium">
                  {item.text}
                </div>
                <div className="text-xs text-gray-500 font-mono hidden sm:block">
                  Elo: {Math.round(item.elo)}
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div className="w-full max-w-3xl mx-auto">
          <div className="bg-charcoal/80 backdrop-blur-xl border border-white/10 rounded-3xl p-6 md:p-10 shadow-2xl relative overflow-hidden">
            <div className="absolute -top-40 -right-40 w-96 h-96 bg-cyan-accent/5 rounded-full blur-3xl pointer-events-none"></div>
            <div className="absolute -bottom-40 -left-40 w-96 h-96 bg-cyan-accent/5 rounded-full blur-3xl pointer-events-none"></div>
            
            <div className="relative z-10">
              {phase === 'input' && renderInputPhase()}
              {phase === 'sorting' && renderSortingPhase()}
              {phase === 'results' && renderResultsPhase()}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <div className="min-h-screen bg-charcoal flex flex-col">
          <header className="w-full p-6 md:p-10 flex items-center justify-between z-10">
            <div className="flex items-center gap-3 group cursor-pointer">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-[0_0_20px_rgba(0,255,255,0.2)] group-hover:shadow-[0_0_30px_rgba(0,255,255,0.4)] transition-all">
                <span className="text-white"><HexagonIcon /></span>
              </div>
              <h1 className="text-xl font-semibold tracking-tight text-white">
                Cyansol<span className="text-cyan-accent font-light">pedia</span>
              </h1>
            </div>
            <nav>
              <span className="text-xs font-mono text-gray-500 uppercase tracking-widest">
                模块 01
              </span>
            </nav>
          </header>

          <main className="flex-1 flex flex-col items-center justify-center p-4 md:p-8 z-10">
            <div className="w-full max-w-5xl mx-auto space-y-12">
              <div className="text-center space-y-4">
                <h2 className="text-4xl md:text-5xl font-bold text-white tracking-tight">
                  配对排序器
                </h2>
                <p className="text-gray-400 max-w-xl mx-auto text-lg">
                  通过简单的 A/B 比较解决选择困难。粘贴列表，选择你的偏好，让算法为你排名。
                </p>
              </div>
              <PairedSorter />
            </div>
          </main>

          <footer className="w-full p-6 text-center text-gray-600 text-sm z-10">
            <p>所有数据处理均在您的浏览器本地完成，不会上传任何数据。</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
